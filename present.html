<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プレゼントのありか | nazotoki</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to bottom, #fff, #fff8e1);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background-color: #ff9800;
      color: white;
      text-align: center;
      padding: 20px 0;
    }

    main {
      width: 90%;
      max-width: 400px;
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .present-icon {
      width: 120px;
      height: 120px;
      margin-right: 10px;
      vertical-align: middle;
    }

    .hint-btn {
      display: inline-block;
      margin: 20px 0 10px;
      padding: 10px 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .hint-btn:hover {
      background-color: #45a049;
    }

    .present-hint {
      text-align: center;
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .present-subhint {
      display: none;
      color: #007bff;
      font-weight: bold;
      margin-top: 10px;
      text-align: center;
    }

    .back-btn {
      margin-top: 30px;
      text-decoration: none;
      color: #333;
      background-color: #f0f0f0;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
    }

    .back-btn:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎁 プレゼントのありか 🐎</h1>
  </header>

  <main>
    <button class="hint-btn" onclick="showHint()">ヒントを見る</button>

    <p class="present-hint">
      <img src="images/ソングライン.png" alt="プレゼント" class="present-icon">
      <strong>〇</strong> の最初の6文字にあるよ！
    </p>

    <p class="present-subhint" id="hidden-hint">
      〇のヒント：路線ネットワークを逆さにしてみよう
    </p>

    <a href="index.html" class="back-btn">🏠 ホームに戻る</a>
  </main>

  <script>
    function showHint() {
      // id="hidden-hint" の表示状態を切り替える
      const hint = document.getElementById('hidden-hint');
      hint.style.display = (hint.style.display === 'none' || hint.style.display === '') 
        ? 'block' 
        : 'none';
    }
  </script>
</body>
</html>
